<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de IA · Marlon</title>

    <!-- Favicon SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2300E5A0'/><stop offset='1' stop-color='%2300A6FB'/></linearGradient></defs><rect width='64' height='64' rx='16' fill='%230B0F19'/><path d='M20 22h24a4 4 0 0 1 4 4v14a4 4 0 0 1-4 4H30l-8 6v-6h-2a4 4 0 0 1-4-4V26a4 4 0 0 1 4-4Z' fill='url(%23g)'/><circle cx='27' cy='33' r='2.4' fill='%230B0F19'/><circle cx='37' cy='33' r='2.4' fill='%230B0F19'/></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-base: #0a0d14;
            --bg-soft: #10141d;
            --bg-elev: #161b27;
            --bg-elev-2: #1d2330;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text: #e7ebf3;
            --text-dim: #9aa3b2;
            --text-mute: #6b7383;
            --accent: #00e5a0;
            --accent-2: #00a6fb;
            --grad-accent: linear-gradient(135deg, #00e5a0 0%, #00a6fb 100%);
            --grad-user: linear-gradient(135deg, #1a8cff 0%, #00a6fb 100%);
            --grad-header: radial-gradient(120% 100% at 0% 0%, rgba(0,229,160,0.10) 0%, transparent 50%),
                           radial-gradient(120% 100% at 100% 0%, rgba(0,166,251,0.10) 0%, transparent 50%);
            --shadow-soft: 0 1px 0 rgba(255,255,255,0.03) inset, 0 10px 30px rgba(0,0,0,0.45);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; overflow: hidden; }

        body {
            font-family: 'Manrope', sans-serif;
            background: var(--bg-base);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            min-height: 100dvh;
            position: relative;
        }

        /* Efeito de fundo */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(60% 50% at 15% 10%, rgba(0,229,160,0.10) 0%, transparent 60%),
                        radial-gradient(50% 45% at 90% 100%, rgba(0,166,251,0.10) 0%, transparent 60%);
            z-index: 0;
        }

        .chat-container {
            position: relative; z-index: 1;
            width: 100%; max-width: 720px;
            height: min(86dvh, 880px);
            background: linear-gradient(180deg, var(--bg-soft) 0%, var(--bg-base) 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column;
            overflow: hidden; backdrop-filter: blur(12px);
        }

        .chat-header {
            display: flex; align-items: center; gap: 14px;
            padding: 20px 24px;
            background: var(--grad-header), var(--bg-soft);
            border-bottom: 1px solid var(--border);
        }

        .header-avatar {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--grad-accent);
            display: grid; place-items: center; color: #0a0d14;
            box-shadow: 0 6px 18px rgba(0, 229, 160, 0.35);
        }

        .header-avatar svg { width: 24px; height: 24px; }

        .header-title { font-weight: 700; font-size: 1.05rem; }
        .header-status { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--text-dim); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,229,160,0.6); }
            70% { box-shadow: 0 0 0 8px rgba(0,229,160,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
        }

        .chat-messages {
            flex: 1; padding: 24px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg-row { display: flex; gap: 12px; max-width: 88%; animation: rise 0.35s ease-out; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-bubble {
            padding: 12px 16px; line-height: 1.55; font-size: 0.95rem;
            border-radius: 16px; word-wrap: break-word;
           
            white-space: pre-wrap; 
        }

        .msg-row.ai .msg-bubble { background: var(--bg-elev); border: 1px solid var(--border); border-top-left-radius: 6px; }
        .msg-row.user .msg-bubble { background: var(--grad-user); color: white; border-top-right-radius: 6px; }

        .msg-avatar { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; }
        .msg-avatar.ai { background: var(--grad-accent); color: #0a0d14; }
        .msg-avatar.user { background: var(--bg-elev-2); border: 1px solid var(--border-strong); }
        .msg-avatar svg { width: 18px; height: 18px; }

        .chat-input-area { padding: 18px; border-top: 1px solid var(--border); }
        .input-wrap {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-elev); border: 1px solid var(--border-strong);
            border-radius: 18px; padding: 6px 6px 6px 18px;
        }
        #user-input { flex: 1; border: none; outline: none; background: transparent; color: white; padding: 12px 0; }
        
        #send-btn {
            width: 44px; height: 44px; border: none; border-radius: 14px;
            background: var(--grad-accent); cursor: pointer; display: grid; place-items: center;
        }

        /* Estilo para o indicador de digitação */
        .typing-row { display: none; padding: 0 24px 10px; gap: 12px; }
        .typing-row.visible { display: flex; }
        .typing-bubble { background: var(--bg-elev); padding: 12px 16px; border-radius: 16px; display: flex; gap: 4px; }
        .typing-bubble span { width: 6px; height: 6px; background: var(--text-mute); border-radius: 50%; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .icon-btn { 
            background: none; border: 1px solid var(--border); border-radius: 10px; 
            color: var(--text-dim); cursor: pointer; padding: 8px; transition: 0.2s;
        }
        .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="header-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="3"/><path d="M12 7V3"/><circle cx="12" cy="3" r="1"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/><path d="M9 17h6"/></svg>
            </div>
            <div class="header-text">
                <div class="header-title">Assistente do Marlon</div>
                <div class="header-status"><span class="status-dot"></span> Online</div>
            </div>
            <div style="margin-left: auto;">
                <button class="icon-btn" onclick="clearChat()" title="Limpar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
        </header>

        <main class="chat-messages" id="chat-messages">
            <!-- Mensagem inicial fixa -->
            <div class="msg-row ai">
                <div class="msg-avatar ai">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.8 4.6L18.5 8 14 11l1.5 5L12 13l-3.5 3L10 11 5.5 8l4.7-1.4L12 2z"/></svg>
                </div>
                <div class="msg-bubble">Olá! Sou a IA desenvolvida pelo <strong>Marlon</strong>. Como posso te ajudar hoje?</div>
            </div>
        </main>

        <div class="typing-row" id="typing-indicator">
            <div class="msg-avatar ai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.8 4.6L18.5 8 14 11l1.5 5L12 13l-3.5 3L10 11 5.5 8l4.7-1.4L12 2z"/></svg></div>
            <div class="typing-bubble"><span></span><span style="animation-delay:0.2s"></span><span style="animation-delay:0.4s"></span></div>
        </div>

        <footer class="chat-input-area">
            <div class="input-wrap">
                <input type="text" id="user-input" placeholder="Digite sua dúvida..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()">
                <button id="send-btn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');
        const sendBtn = document.getElementById('send-btn');

        const ICON_BOT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.8 4.6L18.5 8 14 11l1.5 5L12 13l-3.5 3L10 11 5.5 8l4.7-1.4L12 2z"/></svg>`;
        const ICON_USER = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>`;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            
            typingIndicator.classList.add('visible');
            scrollToBottom();

            try {
                const response = await fetch('/perguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pergunta: text })
                });
                const data = await response.json();
                typingIndicator.classList.remove('visible');
               
                appendMessage(data.resposta, 'ai', true); 
            } catch (error) {
                typingIndicator.classList.remove('visible');
                appendMessage('Erro de conexão com o servidor.', 'ai');
            }
        }

        function appendMessage(text, role, isHTML = false) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;

            const avatar = document.createElement('div');
            avatar.className = `msg-avatar ${role}`;
            avatar.innerHTML = role === 'ai' ? ICON_BOT : ICON_USER;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            
            // CORREÇÃO: Define se trata como texto puro ou HTML
            if(isHTML) bubble.innerHTML = text;
            else bubble.textContent = text;

            row.appendChild(avatar);
            row.appendChild(bubble);
            chatMessages.appendChild(row);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function clearChat() {
            chatMessages.innerHTML = '';
            appendMessage('Conversa reiniciada. Em que posso ajudar?', 'ai');
        }
    </script>
</body>
</html>
